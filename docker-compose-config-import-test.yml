services:
  meshmonitor:
    image: meshmonitor:test
    container_name: meshmonitor-config-import-test
    ports:
      - "8084:3001"
    volumes:
      - meshmonitor-config-import-test-data:/data
    environment:
      - MESHTASTIC_NODE_IP=192.168.5.106
    restart: unless-stopped

volumes:
  meshmonitor-config-import-test-data:
